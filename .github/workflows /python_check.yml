name: pyhton check

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
       uses: actions/checkout@v6 # Descarga tu código en el servidor
       
       -name: Set up Python
        uses: actions/setup-python@v6 #
          with:
            python-version: '3.14'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install flake8 # Instalamos un linter sencillo

        - name: Lint with flake8
          run: |
            # Este comando busca errores de sintaxis ("E9", "F63", "F7", "F82")
            flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
    
